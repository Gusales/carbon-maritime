<article class="bg-maritime-light rounded-lg p-6 border-l-4" [class]="getBorderClass">
  <header class="flex items-center gap-3 mb-2">
    <figure>
      <lucide-icon [img]="getStatusIcon" [class]="getStatusColor" />
    </figure>

    <h3 class="font-medium text-gray-800">{{ cardHeaderTitle }}</h3>
  </header>
  <p class="text-4xl font-medium" [class]="getTextColor">
    {{ value }}
  </p>
</article>
