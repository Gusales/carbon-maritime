<main class="max-w-4xl mx-auto space-y-8">
  <header class="mb-8">
    <h2 class="mb-2">Nova Embarcação</h2>
    <p class="text-gray-600">Cadastre uma embarcação para cálculo de emissões</p>
  </header>

  <section>
    <app-form-criar-embarcacao />
  </section>

  <article class="bg-maritime-light rounded-lg p-6 border-l-4 border-maritime-primary flex gap-3">
    <div>
      <lucide-icon [img]="ShipIcon" size="24" class="text-maritime-primary shrink-0" />
    </div>
    <div>
      <h3 class="font-medium text-gray-800 mb-1">Informação</h3>
      <p class="text-sm text-gray-700">
        Os dados da embarcação são necessários para calcular com precisão as emissões de CO₂ de
        acordo com as normativas ISO 14083 e IMO MEPC.245.
      </p>
    </div>
  </article>
</main>
