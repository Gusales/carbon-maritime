<div class="flex gap-3">
  @for (option of options; track option.value) {
    <button
      type="button"
      (click)="onSelect(option)"
      class="rounded-xl px-5 py-3 transition-colors cursor-pointer"
      [class.bg-blue-600]="value === option.value"
      [class.text-white]="value === option.value"
      [class.bg-gray-100]="value !== option.value"
      [class.text-gray-700]="value !== option.value"
    >
      {{ option.label }}
    </button>
  }
</div>
