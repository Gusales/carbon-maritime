<button
  [disabled]="disabled || isLoading"
  (click)="onClick($event)"
  class="cursor-pointer inline-flex items-center gap-2 bg-maritime-primary text-white px-8 py-3 rounded-lg hover:bg-maritime-hover transition-colors font-medium min-h-11 disabled:opacity-50 disabled:cursor-not-allowed"
>
  <!-- Spinner de loading -->
  <svg
    *ngIf="isLoading"
    class="animate-spin h-4 w-4"
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
  >
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
  </svg>
  <ng-content />
</button>
