<div class="flex flex-col gap-1">
    @if (label) {
    <label class="text-sm font-medium text-gray-700">{{ label }}</label>
    }
    <input [type]="type" [value]="value" [placeholder]="placeholder" [disabled]="isDisabled" (input)="onInput($event)"
        (blur)="onBlur()"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-maritime-primary focus:border-transparent min-h-11" />
</div>
